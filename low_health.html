<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Low Health Horror UI Overlay</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&amp;family=Courier+Prime:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ff1111",
                        "terminal-red": "#ff0000",
                        "background-dark": "#0a0304",
                        "danger-glow": "#b30000",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "monospace"],
                        "distressed": ["Special Elite", "Courier Prime", "monospace"]
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @keyframes pulse-red {
            0%, 100% { box-shadow: inset 0 0 100px rgba(255, 0, 0, 0.6); opacity: 1; }
            50% { box-shadow: inset 0 0 180px rgba(255, 0, 0, 0.9); opacity: 0.8; }
        }
        @keyframes pulse-text {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        @keyframes glitch {
            0% { transform: translate(0) skew(0deg); }
            20% { transform: translate(-2px, 1px) skew(1deg); }
            40% { transform: translate(-2px, -1px) skew(-1deg); }
            60% { transform: translate(2px, 1px) skew(0deg); }
            80% { transform: translate(2px, -1px) skew(1deg); }
            100% { transform: translate(0) skew(0deg); }
        }
        @keyframes chromatic {
            0% { text-shadow: 2px 0 0 #ff0000, -2px 0 0 #00ffff; }
            50% { text-shadow: -1px 0 0 #ff0000, 1px 0 0 #00ffff; }
            100% { text-shadow: 2px 0 0 #ff0000, -2px 0 0 #00ffff; }
        }
        .low-health-vignette {
            box-shadow: inset 0 0 150px rgba(120, 0, 0, 0.8);
            animation: pulse-red 2s infinite ease-in-out;
            pointer-events: none;
        }
        .grain {
            background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuCL47V-FWSL7YjoscNDu-AMUvK80Snbc3F21SPD6l5fvTvEJe7pDk-3JLQZdE6uljBE6G807FiIzV-U0lyB1CpMdklKFgcnHV11pE5falGlH6WMT2fZNtAAMFOFbu1vcWwomQd-M0C2lMn-6Z1dQkMv6zsGdmvzIu-hJDnxOAi8TksQ2E7y7nfSWe8h4AsrvMIN9QlIH-UpX8ly5VP7cP8MSVkkWG0J9pFaN0LBhaqOwVzVWYHn0Clx2mIvOAgF8JURo4OY1afYOO8);
            opacity: 0.1;
            pointer-events: none;
            filter: contrast(150%) brightness(50%);
        }
        .scanline {
            background: linear-gradient(to bottom, rgba(18, 16, 16, 0) 50%, rgba(255, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            pointer-events: none;
        }
        .chromatic-aberration {
            filter: drop-shadow(2px 0px 0px rgba(255,0,0,0.5)) drop-shadow(-2px 0px 0px rgba(0,255,255,0.3));
        }
        .glitch-effect {
            animation: glitch 0.3s infinite;
        }
        .pulse-fast {
            animation: pulse-text 0.5s infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display text-slate-100 overflow-hidden select-none">
<div class="fixed inset-0 low-health-vignette z-50"></div>
<div class="fixed inset-0 grain z-40"></div>
<div class="fixed inset-0 scanline z-30"></div>
<div class="fixed inset-0 pointer-events-none z-[45] opacity-20 border-[20px] border-primary/20 blur-xl"></div>
<div class="relative z-20 flex flex-col h-screen w-full p-4 lg:p-6 justify-between">
<header class="flex flex-col gap-4">
<div class="flex items-center justify-between border-b border-primary/40 pb-2">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-3xl pulse-fast">warning</span>
<div class="glitch-effect">
<h1 class="text-xs font-bold tracking-widest text-primary uppercase">System Failure v1.0.4</h1>
<p class="text-[10px] text-primary/80 font-mono tracking-tighter">SIGNAL_LOST // LOC: ERROR_404</p>
</div>
</div>
<div class="flex items-center gap-4">
<div class="text-right">
<p class="text-[10px] text-primary font-mono uppercase pulse-fast">Bio-Sync Critical</p>
<p class="text-xs font-bold text-primary font-distressed">DEATH_IMMINENT</p>
</div>
<span class="material-symbols-outlined text-primary pulse-fast">heart_broken</span>
</div>
</div>
<nav class="flex gap-2">
<a class="group relative flex flex-col items-center justify-center size-16 bg-primary/5 border border-primary/20 rounded backdrop-blur-sm transition-all" href="#">
<span class="material-symbols-outlined text-primary/60 scale-95 opacity-80">map</span>
<span class="text-[9px] font-bold mt-1 text-primary/40 font-mono">MAP</span>
<div class="absolute -top-1 -left-1 size-2 border-t border-l border-primary/40"></div>
</a>
<a class="group relative flex flex-col items-center justify-center size-16 bg-primary/20 border border-primary/60 rounded backdrop-blur-sm transition-all glitch-effect" href="#">
<span class="material-symbols-outlined text-primary">backpack</span>
<span class="text-[9px] font-bold mt-1 text-primary font-mono">ITEMS</span>
<div class="absolute -top-1 -left-1 size-2 border-t border-l border-primary"></div>
<div class="absolute inset-0 bg-primary/10 animate-pulse"></div>
</a>
<a class="group relative flex flex-col items-center justify-center size-16 bg-primary/5 border border-primary/20 rounded backdrop-blur-sm transition-all" href="#">
<span class="material-symbols-outlined text-primary/60 scale-90 opacity-70">description</span>
<span class="text-[9px] font-bold mt-1 text-primary/40 font-mono">FILES</span>
<div class="absolute -top-1 -left-1 size-2 border-t border-l border-primary/40"></div>
</a>
<a class="group relative flex flex-col items-center justify-center size-16 bg-primary/5 border border-primary/20 rounded backdrop-blur-sm transition-all" href="#">
<span class="material-symbols-outlined text-primary/60 scale-95 opacity-80">settings</span>
<span class="text-[9px] font-bold mt-1 text-primary/40 font-mono">SYS</span>
<div class="absolute -top-1 -left-1 size-2 border-t border-l border-primary/40"></div>
</a>
</nav>
</header>
<main class="flex-1 flex items-center justify-center pointer-events-none">
<div class="border border-primary/10 size-72 rounded-full flex items-center justify-center opacity-30 blur-sm">
<div class="border-2 border-primary/20 size-56 rounded-full flex items-center justify-center">
<div class="size-2 bg-primary/80 rounded-full pulse-fast shadow-[0_0_15px_#ff0000]"></div>
</div>
</div>
</main>
<footer class="flex items-end justify-between">
<div class="flex flex-col gap-2 max-w-[140px] opacity-70">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-sm pulse-fast">battery_0_bar</span>
<span class="text-[10px] text-primary font-mono uppercase tracking-widest font-bold">Power: 04%</span>
</div>
<div class="h-1 w-full bg-primary/20 rounded-full overflow-hidden">
<div class="h-full bg-primary w-[4%] animate-pulse"></div>
</div>
<div class="text-[8px] text-primary font-mono italic">ERR_DATA_CORRUPTION</div>
</div>
<div class="flex flex-col items-end gap-1">
<div class="relative bg-background-dark/90 p-3 rounded border border-primary/50 backdrop-blur-xl shadow-[0_0_20px_rgba(255,0,0,0.2)]">
<div class="flex items-center gap-4 mb-1">
<p class="text-[10px] font-distressed text-primary uppercase tracking-tighter">Vitals: CRITICAL</p>
<p class="text-xs font-mono text-primary font-bold tracking-tighter pulse-fast">152 BPM</p>
</div>
<div class="w-44 h-12 flex items-center overflow-hidden bg-primary/5 rounded">
<svg class="w-full h-full stroke-primary pulse-fast" preserveAspectRatio="none" viewBox="0 0 100 40">
<path class="chromatic-aberration" d="M0 20 L5 20 L7 10 L10 30 L12 20 L25 20 L27 5 L30 35 L33 5 L36 38 L39 20 L55 20 L57 0 L60 40 L63 5 L66 20 L80 20 L82 10 L85 30 L87 20 L100 20" fill="none" stroke-width="2">
</path>
</svg>
</div>
<div class="mt-2 flex justify-between items-center w-full">
<p class="text-lg font-distressed text-primary font-black uppercase italic tracking-tighter pulse-fast chromatic-aberration">DANGER</p>
<div class="size-3 rounded-full bg-primary shadow-[0_0_12px_#ff0000] animate-ping"></div>
</div>
<div class="absolute -bottom-1 -right-1 size-4 border-b-2 border-r-2 border-primary"></div>
<div class="absolute -top-1 -left-1 size-4 border-t-2 border-l-2 border-primary"></div>
</div>
</div>
</footer>
</div>
<div class="fixed inset-0 bg-gradient-to-t from-background-dark via-transparent to-background-dark/80 pointer-events-none z-10"></div>
<div class="fixed inset-0 bg-[radial-gradient(circle_at_center,transparent_30%,rgba(40,0,0,0.4)_100%)] pointer-events-none z-10"></div>
<div class="fixed top-0 left-0 w-full h-1 bg-primary/10 z-50">
<div class="h-full bg-primary w-1/12 animate-pulse shadow-[0_0_10px_#ff0000]"></div>
</div>

</body></html>
